<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Letter for Veronika</title>
  <style>
    :root {
      --night: #1b1730;
      --night-2: #2b2250;
      --gold: #d5a874;
      --gold-deep: #ab7d4f;
      --line: #5e4b83;
      --paper: #fff6e8;
      --paper-edge: #dbc7a6;
      --ink: #4a3030;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(1200px 700px at 30% 15%, #3e2c6d 0%, transparent 65%),
        radial-gradient(1000px 700px at 75% 85%, #3b2758 0%, transparent 70%),
        linear-gradient(180deg, var(--night-2), var(--night));
      color: #fff;
    }

    .sparkles,
    .sparkles::before,
    .sparkles::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(#ffffff88 1px, transparent 1px);
      background-size: 40px 40px;
      animation: drift 22s linear infinite;
      opacity: .3;
    }
    .sparkles::before { background-size: 60px 60px; animation-duration: 30s; opacity: .25; }
    .sparkles::after  { background-size: 85px 85px; animation-duration: 38s; opacity: .2; }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(40px); }
    }

    .scene { width: min(92vw, 460px); text-align: center; }
    .title { font-size: clamp(1.1rem, 3.5vw, 1.6rem); margin-bottom: .35rem; }
    .hint { opacity: .9; margin-bottom: 1rem; font-size: .95rem; }

    .envelope-wrap {
      display: inline-block;
      animation: bob 2.6s ease-in-out infinite;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.35));
    }

    @keyframes bob {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-7px); }
    }

    .envelope {
      width: min(84vw, 340px);
      aspect-ratio: 10 / 7;
      position: relative;
      border: 4px solid var(--line);
      background: linear-gradient(0deg, var(--gold-deep), var(--gold));
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 0;
      padding: 0;
      outline: none;
      transform: scale(1);
      transition: transform 140ms ease;
    }
    .envelope:active { transform: scale(.985); }
    .envelope:focus-visible { box-shadow: 0 0 0 3px #f7e9cd; }

    .envelope::before,
    .envelope::after {
      content: "";
      position: absolute;
      inset: 0;
      background: #9f7348;
      opacity: .86;
    }
    .envelope::before { clip-path: polygon(0 0, 50% 56%, 0 100%); }
    .envelope::after  { clip-path: polygon(100% 0, 50% 56%, 100% 100%); }

    .to {
      position: absolute;
      top: 58%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      background: rgba(255, 247, 232, .9);
      color: #684c37;
      border: 2px solid #9c7652;
      padding: 5px 11px;
      font-size: clamp(.8rem, 2.1vw, .95rem);
      transition: opacity .25s ease, transform .3s ease;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .flap {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0, 100% 0, 50% 58%);
      transform-origin: top;
      background: linear-gradient(180deg, #ddb684, #b48758);
      border-bottom: 4px solid var(--line);
      transition: transform .72s cubic-bezier(.2,.8,.2,1);
      z-index: 4;
    }

    .letter {
      position: absolute;
      left: 10%; right: 10%; bottom: 9%;
      height: 78%;
      border: 4px solid var(--paper-edge);
      background: var(--paper);
      color: var(--ink);
      display: grid;
      place-items: center;
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      font-weight: 600;
      transform: translateY(60%);
      transition: transform .72s cubic-bezier(.2,.8,.2,1);
      z-index: 2;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .message {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .33s ease, transform .33s ease;
    }

    .envelope.open .flap { transform: rotateX(180deg); }
    .envelope.open .letter { transform: translateY(-8%); }
    .envelope.open .message { opacity: 1; transform: translateY(0); transition-delay: .38s; }
    .envelope.open .to { opacity: 0; transform: translate(-50%, -66%); }
  </style>
</head>
<body>
  <div class="sparkles" aria-hidden="true"></div>

  <main class="scene">
    <div class="title">A little note for Veronika</div>
    <div class="hint">Tap / click envelope to open ✨</div>

    <div class="envelope-wrap">
      <button id="envelope" class="envelope" type="button" aria-label="Open letter for Veronika">
        <div class="to">To Veronika</div>
        <div class="letter"><div class="message">I love you ♥</div></div>
        <div class="flap"></div>
      </button>
    </div>
  </main>

  <script>
    const envelope = document.getElementById('envelope');
    const toggleOpen = () => envelope.classList.toggle('open');

    envelope.addEventListener('click', toggleOpen);
    envelope.addEventListener('pointerdown', (event) => {
      if (event.pointerType === 'touch') {
        event.preventDefault();
        toggleOpen();
      }
    });

    envelope.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        toggleOpen();
      }
    });
  </script>
</body>
</html>
