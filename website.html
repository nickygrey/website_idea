<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Mail - Veronika</title>
  <style>
    :root {
      --bg-1: #0f1a2a;
      --bg-2: #1c2f46;
      --panel: #233a56;
      --panel-edge: #3e6088;
      --gold: #c9a15e;
      --gold-dark: #8c6a32;
      --paper: #f4e9c9;
      --paper-edge: #b9a47a;
      --ink: #2d1f1a;
      --hp: #ef5a5a;
      --mp: #5aa9ef;
      --xp: #73d67a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
      color: #eaf5ff;
      background:
        linear-gradient(180deg, var(--bg-2), var(--bg-1)),
        repeating-linear-gradient(0deg, transparent 0 7px, rgba(255,255,255,.03) 7px 8px);
      font-family: "Courier New", monospace;
      image-rendering: pixelated;
    }

    .ui {
      width: min(96vw, 560px);
      border: 4px solid #0a111d;
      background: var(--panel);
      box-shadow:
        inset 0 0 0 3px var(--panel-edge),
        0 8px 0 #0a111d,
        0 14px 26px rgba(0,0,0,.5);
      padding: 10px;
    }

    .hud {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 11px;
      letter-spacing: .5px;
    }

    .bar {
      border: 2px solid #0a111d;
      height: 14px;
      background: #15263a;
      position: relative;
    }

    .fill { height: 100%; }
    .hp { width: 84%; background: var(--hp); }
    .mp { width: 62%; background: var(--mp); }
    .xp { width: 48%; background: var(--xp); }

    .label { margin-bottom: 2px; }

    .hint {
      text-align: center;
      font-size: 11px;
      margin: 8px 0 10px;
      color: #cde8ff;
    }

    .envelope {
      width: min(92%, 380px);
      aspect-ratio: 10/7;
      margin: 0 auto;
      position: relative;
      border: 4px solid #1b1307;
      background: linear-gradient(0deg, var(--gold-dark), var(--gold));
      cursor: pointer;
      outline: none;
      box-shadow: inset 0 0 0 3px #e9ca8e;
      transition: transform 140ms steps(2, end);
    }
    .envelope:hover { transform: translateY(-2px); }
    .envelope:focus-visible { box-shadow: inset 0 0 0 3px #e9ca8e, 0 0 0 3px #fff; }

    .envelope::before,
    .envelope::after {
      content: "";
      position: absolute;
      inset: 0;
      background: #9e763d;
      opacity: .9;
    }
    .envelope::before { clip-path: polygon(0 0, 50% 56%, 0 100%); }
    .envelope::after { clip-path: polygon(100% 0, 50% 56%, 100% 100%); }

    .flap {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0,100% 0,50% 58%);
      transform-origin: top;
      border-bottom: 4px solid #1b1307;
      background: linear-gradient(180deg, #d3ae6c, #9a733d);
      transition: transform 650ms steps(7,end);
      z-index: 4;
    }

    .letter {
      position: absolute;
      left: 8%; right: 8%; bottom: 8%;
      height: 80%;
      border: 4px solid var(--paper-edge);
      background: var(--paper);
      color: var(--ink);
      padding: 10px;
      transform: translateY(58%);
      transition: transform 650ms steps(7,end);
      z-index: 2;
      overflow: hidden;
      font-size: clamp(11px, 1.7vw, 12px);
      line-height: 1.45;
    }

    .to {
      border-bottom: 2px dashed #a78f63;
      margin-bottom: 8px;
      padding-bottom: 5px;
      font-weight: bold;
    }

    .line { opacity: 0; transform: translateY(4px); transition: all 220ms steps(2,end); }

    .envelope.open .flap { transform: rotateX(180deg); }
    .envelope.open .letter { transform: translateY(-9%); }
    .envelope.open .line { opacity: 1; transform: translateY(0); }
    .envelope.open .line:nth-of-type(2) { transition-delay: 260ms; }
    .envelope.open .line:nth-of-type(3) { transition-delay: 420ms; }
    .envelope.open .line:nth-of-type(4) { transition-delay: 560ms; }

    .footer {
      margin-top: 10px;
      border: 2px solid #0a111d;
      background: #16263b;
      padding: 6px;
      text-align: center;
      font-size: 11px;
      color: #cde8ff;
    }
  </style>
</head>
<body>
  <main class="ui">
    <section class="hud" aria-hidden="true">
      <div>
        <div class="label">HP</div><div class="bar"><div class="fill hp"></div></div>
      </div>
      <div>
        <div class="label">MP</div><div class="bar"><div class="fill mp"></div></div>
      </div>
      <div>
        <div class="label">COZY XP</div><div class="bar"><div class="fill xp"></div></div>
      </div>
    </section>

    <div class="hint">[CLICK ENVELOPE TO OPEN MESSAGE]</div>

    <div id="envelope" class="envelope" role="button" tabindex="0" aria-label="Open letter for Veronika">
      <article class="letter" aria-live="polite">
        <div class="to">TO: VERONIKA</div>
        <div class="line">quest reward unlocked: warm smile</div>
        <div class="line">you make the world feel safer, softer,</div>
        <div class="line">and full of tiny glowing pixels ✨</div>
      </article>
      <div class="flap"></div>
    </div>

    <div class="footer">Controls: Mouse Click / Enter / Space</div>
  </main>

  <script>
    const envelope = document.getElementById('envelope');
    const toggleEnvelope = () => envelope.classList.toggle('open');
    envelope.addEventListener('click', toggleEnvelope);
    envelope.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleEnvelope();
      }
    });
  </script>
</body>
</html>
